<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fastlane Transport Services</title>

    <link rel="stylesheet" href="style.css">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            color: white;
        }

        header {
            text-align: center;
            padding: 20px;
        }

        header img {
            width: 120px;
        }

        h2 {
            text-align: center;
            color: gold;
        }

        .fleet {
            display: flex;
            gap: 20px;
            padding: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            width: 250px;
            height: 380px;
            background: #111;
            border-radius: 15px;
            overflow: hidden;
            text-align: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .card h3 {
            margin: 10px 0 5px;
        }

        .card p {
            color: #ccc;
            font-size: 14px;
        }

        footer {
            text-align: center;
            padding: 20px;
        }

        .contact {
            color: gold;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="Fastlane Logo">
    <h1>Fastlane Transport Services</h1>
</header>

<h2>Our Fleet</h2>

<section class="fleet">

    <div class="card">
        <img src="images/car1.jpg" alt="Toyota Hiace">
        <h3>Toyota Hiace</h3>
        <p>Spacious & Comfortable</p>
    </div>

    <div class="card">
        <img src="images/car2.jpg" alt="Toyota Mark X">
        <h3>Toyota Mark X</h3>
        <p>Luxury & Style</p>
    </div>

    <div class="card">
        <img src="images/car3.jpg" alt="Executive Sedan">
        <h3>Executive Sedan</h3>
        <p>Premium Comfort</p>
    </div>

    <div class="card">
        <img src="images/car4.jpg" alt="Tour Van">
        <h3>Tour Van</h3>
        <p>Perfect for Groups</p>
    </div>

</section>

<footer>
    <p class="contact">
        📞 +256 775 607625 | +256 745 185914
    </p>
</footer>

</body>
</html>
